services:
  - type: web
    name: caro-game
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    disks:
      - name: caro-data
        mountPath: /var/data
        sizeGB: 1
    envVars:
      - key: DB_PATH
        value: /var/data/app.db
      - key: SOCKETIO_ASYNC_MODE
        value: eventlet
      - key: ADMIN_DASHBOARD_TOKEN
        generateValue: true
